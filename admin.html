<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tensric Admin Console">
    <title>Admin - Tensric</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* Temp hide body until auth check completes to prevent flash of content */
        body {
            visibility: hidden;
        }

        body.auth-checked {
            visibility: visible;
        }
    </style>
</head>

<body class="bg-noise">
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo">
                    <img src="assets/logo.png" alt="Tensric Logo" class="logo-img">
                    <span class="logo-text">Tensric</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="dashboard.html" class="nav-item">
                        <div class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7" />
                                <rect x="14" y="3" width="7" height="7" />
                                <rect x="14" y="14" width="7" height="7" />
                                <rect x="3" y="14" width="7" height="7" />
                            </svg>
                        </div>
                        Dashboard
                    </a>
                    <a href="generate.html" class="nav-item">
                        <div class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                                <path d="M2 17l10 5 10-5" />
                                <path d="M2 12l10 5 10-5" />
                            </svg>
                        </div>
                        Generate
                    </a>
                    <a href="video.html" class="nav-item">
                        <div class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="23 7 16 12 23 17 23 7" />
                                <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                            </svg>
                        </div>
                        Video
                    </a>
                    <a href="enhance.html" class="nav-item">
                        <div class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3" />
                                <path
                                    d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                            </svg>
                        </div>
                        Enhance
                    </a>
                    <a href="settings.html" class="nav-item">
                        <div class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3" />
                                <path
                                    d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
                            </svg>
                        </div>
                        Settings
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="user-menu" style="cursor: pointer;" onclick="NexusAuth.logout()" title="Sign out">
                    <div class="avatar" id="userAvatar">A</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Admin</div>
                        <div class="user-email" id="userEmail">admin@tensric.com</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content flex flex-col items-center">

            <div class="w-full max-w-6xl">
                <div class="admin-header">
                    <div>
                        <h1>Administration Console</h1>
                        <p class="text-muted" style="margin-top: 8px;">Platform overview and user oversight</p>
                    </div>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="card stat-card">
                        <div class="icon-3d" style="width: 56px; height: 56px;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 00-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 010 7.75"></path>
                            </svg>
                        </div>
                        <div>
                            <div class="stat-value" id="statTotalUsers">...</div>
                            <div class="stat-label">Total Users</div>
                        </div>
                    </div>

                    <div class="card stat-card">
                        <div class="icon-3d pink" style="width: 56px; height: 56px;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <path
                                    d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                                </path>
                                <circle cx="12" cy="13" r="4"></circle>
                            </svg>
                        </div>
                        <div>
                            <div class="stat-value" id="statGenerations">...</div>
                            <div class="stat-label">Total Generations</div>
                        </div>
                    </div>

                    <div class="card stat-card">
                        <div class="icon-3d cyan" style="width: 56px; height: 56px;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                            </svg>
                        </div>
                        <div>
                            <div class="stat-value" id="statActiveUsers">...</div>
                            <div class="stat-label">Active Users (24h)</div>
                        </div>
                    </div>

                    <div class="card stat-card">
                        <div class="icon-3d emerald" style="width: 56px; height: 56px;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <line x1="12" y1="1" x2="12" y2="23"></line>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                        </div>
                        <div>
                            <div class="stat-value" id="statRevenue">...</div>
                            <div class="stat-label">Est. Revenue /mo</div>
                        </div>
                    </div>
                </div>

                <!-- Recent Registered Users -->
                <div class="card p-6">
                    <h3 style="margin-bottom: var(--space-4);">Registered Users</h3>

                    <div id="emptyUsersState" style="display:none; text-align: center; padding: 40px 20px;">
                        <p class="text-muted">No users found.</p>
                    </div>

                    <div class="users-table-wrapper">
                        <table class="users-table">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Joined Date</th>
                                    <th>Plan</th>
                                    <th>Credits</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <!-- Users rows inserted here via admin.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = NexusAuth ? NexusAuth.getCurrentUser() : null;
            if (user) {
                document.getElementById('userName').textContent = user.name || 'Admin';
                document.getElementById('userEmail').textContent = user.email || '';

                const avatarEl = document.getElementById('userAvatar');
                avatarEl.textContent = (user.name || 'A').charAt(0).toUpperCase();

                // If user has a selected avatar color, apply it
                if (user.avatarColor) {
                    avatarEl.style.background = user.avatarColor;
                } else {
                    // Default to the purple gradient used in enhance.html
                    avatarEl.style.background = 'var(--gradient-primary)';
                }
            }
            // Show body after synchronous auth logic completes
            document.body.classList.add('auth-checked');
        });
    </script>
</body>

</html>
